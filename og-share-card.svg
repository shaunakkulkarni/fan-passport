<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1f4d3a"/>
      <stop offset="100%" stop-color="#163a2b"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="0.8" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Stamp circle — centered top -->
  <circle cx="600" cy="130" r="78" fill="none" stroke="#a5342b" stroke-width="3" stroke-dasharray="6 4" transform="rotate(-9 600 130)"/>
  <circle cx="600" cy="130" r="62" fill="none" stroke="#a5342b" stroke-width="1.5" opacity="0.5" transform="rotate(-9 600 130)"/>
  <text x="600" y="120" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#a5342b" text-anchor="middle" letter-spacing="2" transform="rotate(-9 600 130)">FAN</text>
  <text x="600" y="140" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#a5342b" text-anchor="middle" letter-spacing="2" transform="rotate(-9 600 130)">PASSPORT</text>
  <text x="600" y="156" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#a5342b" text-anchor="middle" letter-spacing="1" transform="rotate(-9 600 130)">EST. 2026</text>

  <!-- Title — centered -->
  <text x="600" y="280" font-family="'Fraunces', serif" font-size="64" font-weight="700" fill="#ded2ae" text-anchor="middle">Fan Passport</text>
  <text x="600" y="340" font-family="'Fraunces', serif" font-size="40" font-weight="500" fill="#ded2ae" opacity="0.9" text-anchor="middle">Find your club.</text>

  <!-- Stats line -->
  <text x="600" y="400" font-family="'IBM Plex Mono', monospace" font-size="18" fill="#b8902e" letter-spacing="4" text-anchor="middle">7 LEAGUES · 140+ CLUBS · ONE INTERVIEW</text>

  <!-- Description — higher contrast -->
  <text x="600" y="460" font-family="'Inter', sans-serif" font-size="22" fill="#ded2ae" opacity="0.85" text-anchor="middle">Answer a short interview, get matched to a soccer club</text>
  <text x="600" y="492" font-family="'Inter', sans-serif" font-size="22" fill="#ded2ae" opacity="0.85" text-anchor="middle">by identity and playing style.</text>

  <!-- Bottom border -->
  <rect x="100" y="560" width="1000" height="2" fill="#b8902e" opacity="0.5"/>
  <text x="600" y="590" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#ded2ae" opacity="0.5" text-anchor="middle" letter-spacing="2">PREMIER LEAGUE · LA LIGA · SERIE A · BUNDESLIGA · LIGUE 1 · MLS · LIGA MX</text>
</svg>